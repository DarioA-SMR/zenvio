<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>
  <!-- list icon lines -->
  <line x1="14" y1="22" x2="50" y2="22" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="38" y2="32" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="14" y1="42" x2="28" y2="42" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- accent dot -->
  <circle cx="50" cy="42" r="7" fill="white" fill-opacity="0.95"/>
</svg>
